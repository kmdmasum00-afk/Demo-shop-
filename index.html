!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masum Demo Shop</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #0d6efd;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.cart {
    background: white;
    color: #0d6efd;
    padding: 5px 10px;
    border-radius: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin: 10px 0;
}

.price {
    color: green;
    font-weight: bold;
}

button {
    background: #0d6efd;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #084298;
}
</style>
</head>
<body>

<header>
    <div class="logo">Masum Demo Shop</div>
    <div class="cart">Cart: <span id="cart-count">0</span></div>
</header>

<section class="products">

<div class="card">
    <img src="https://via.placeholder.com/250" alt="Product">
    <h3>Stylish T-Shirt</h3>
    <p class="price">৳ 550</p>
    <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/250" alt="Product">
    <h3>Smart Watch</h3>
    <p class="price">৳ 1200</p>
    <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/250" alt="Product">
    <h3>Running Shoes</h3>
    <p class="price">৳ 2200</p>
    <button onclick="addToCart()">Add to Cart</button>
</div>

</section>

<script>
let cartCount = 0;

function addToCart() {
    cartCount++;
    document.getElementById("cart-count").innerText = cartCount;
    alert("Product added to cart!");
}
</script>

</body>
</html>
